function parseHist(raw){
  var lines=raw.trim().split("\n").slice(1);
  return lines.map(function(l){
    var p=l.split("\t");
    var price=parseFloat((p[5]||"").replace(/[$,]/g,""))||0;
    return{year:parseInt(p[0]),team:(p[1]||"").trim(),region:(p[2]||"").trim(),seed:parseInt(p[3])||0,buyer:(p[4]||"").trim(),price:price};
  }).filter(function(r){return r.year&&r.team&&r.price>0;});
}

function normTeam(s){
  return(s||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim()
    .replace(/^no /,"north ").replace(/^st /,"saint ").replace(/connecticut/,"uconn")
    .replace(/uconn/,"uconn").replace(/saint johns/,"st johns").replace(/ohio st$/,"ohio state")
    .replace(/teamus/,"team us").replace(/rhinos/,"rhino").replace(/rhino$/,"rhino");
}
function normBuyer(s){
  return(s||"").toLowerCase().replace(/\s+/g," ").trim()
    .replace(/teamus/,"team us").replace(/rhinos/,"rhino").replace(/white boy.*/,"white boy");
}

  for(var s=1;s<=16;s++)seedMap[s]={total:0,count:0,prices:[]};
  allData.forEach(function(r){if(seedMap[r.seed]){seedMap[r.seed].total+=r.price;seedMap[r.seed].count++;seedMap[r.seed].prices.push(r.price);}});

  // Buyer totals
  var buyerMap={};
  allData.forEach(function(r){
    var b=normBuyer(r.buyer);
    if(!buyerMap[b])buyerMap[b]={name:r.buyer,total:0,count:0,seeds:{},prices:[],teams:[]};
    buyerMap[b].total+=r.price;buyerMap[b].count++;
    buyerMap[b].seeds[r.seed]=(buyerMap[b].seeds[r.seed]||0)+1;
    buyerMap[b].prices.push(r.price);
    buyerMap[b].teams.push(r);
  });
  var buyers=Object.values(buyerMap).sort(function(a,b){return b.total-a.total;}).slice(0,12);

  // Team history lookup
  var teamHistMap={};
  allData.forEach(function(r){
    var k=normTeam(r.team);
    if(!teamHistMap[k])teamHistMap[k]=[];
    teamHistMap[k].push(r);
  });

  // Match current bracket teams
  var teamInsights=currentTeams.map(function(t){
    var k=normTeam(t.name);
    var hist=teamHistMap[k]||[];
    // fuzzy: try partial match
    if(!hist.length){
      Object.keys(teamHistMap).forEach(function(hk){
        var tk=k.split(" ")[0];
        if(tk.length>3&&hk.indexOf(tk)>=0&&!hist.length)hist=teamHistMap[hk];
      });
    }
    var avgPrice=hist.length?Math.round(hist.reduce(function(s,r){return s+r.price;},0)/hist.length):null;
    var maxPrice=hist.length?Math.max.apply(null,hist.map(function(r){return r.price;})):null;
    var minPrice=hist.length?Math.min.apply(null,hist.map(function(r){return r.price;})):null;
    var lastYear=hist.length?hist.slice().sort(function(a,b){return b.year-a.year;})[0]:null;
    // seed avg for this team's current seed
    var seedAvg=seedMap[t.seed]&&seedMap[t.seed].count?Math.round(seedMap[t.seed].total/seedMap[t.seed].count):null;
    return{team:t,hist:hist,avgPrice:avgPrice,maxPrice:maxPrice,minPrice:minPrice,lastYear:lastYear,seedAvg:seedAvg};
  }).sort(function(a,b){return a.team.seed-b.team.seed||a.team.region.localeCompare(b.team.region);});

  // Seed summary
  var seedSummary=[];
  for(var s=1;s<=16;s++){
    if(seedMap[s].count>0){
      var avg=Math.round(seedMap[s].total/seedMap[s].count);
      var prices=seedMap[s].prices;
      var mn=Math.min.apply(null,prices),mx=Math.max.apply(null,prices);
      seedSummary.push({seed:s,avg:avg,min:mn,max:mx,count:seedMap[s].count});
    }
  }

  return{teamInsights:teamInsights,buyers:buyers,seedSummary:seedSummary,allData:allData};
}

function mulberry32(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

function runSim(teams,N,blendW,liveWinners,useAdj){
  var rng=mulberry32(20250316),STD=11.2,lw=liveWinners||{};
  var byId={},baseRat={};
  for(var i=0;i<teams.length;i++){byId[teams[i].id]=teams[i];baseRat[teams[i].id]=blendR(teams[i],blendW,useAdj);}
  var wins={};for(var i=0;i<teams.length;i++)wins[teams[i].id]={R64:0,R32:0,S16:0,E8:0,F4:0,Champion:0};
  function playGame(idA,idB,gk,rat){
    if(lw[gk])return lw[gk];
    var u=rng();while(u===0)u=rng();
    var z=Math.sqrt(-2*Math.log(u))*Math.cos(6.283185*rng());
    var diff=(rat[idA]-rat[idB])+STD*z;
    var wid=diff>0?idA:idB;
    var bump=0.04*(Math.abs(diff)-Math.abs(rat[idA]-rat[idB]));
    if(bump>0)rat[wid]+=bump;
    return wid;
  }
  for(var sim=0;sim<N;sim++){
    var rat={};for(var i=0;i<teams.length;i++)rat[teams[i].id]=baseRat[teams[i].id];
    var regWinners=[];
    for(var ri=0;ri<REGIONS.length;ri++){
      var reg=REGIONS[ri];
      var rt=[];for(var i=0;i<teams.length;i++)if(teams[i].region===reg)rt.push(teams[i]);
      var bySeed={};for(var i=0;i<rt.length;i++)bySeed[rt[i].seed]=rt[i];
      var r64w=[];
      for(var mi=0;mi<R64_PAIRS.length;mi++){
        var t1=bySeed[R64_PAIRS[mi][0]],t2=bySeed[R64_PAIRS[mi][1]];
        if(!t1||!t2){r64w.push(null);continue;}
        var gk=reg+"_R64_"+mi,wid=playGame(t1.id,t2.id,gk,rat);
        wins[wid].R64++;r64w.push(byId[wid]);
      }
      var r32w=[];
      for(var pi=0;pi<R32_PAIRS.length;pi++){
        var a=r64w[R32_PAIRS[pi][0]],b=r64w[R32_PAIRS[pi][1]];
        if(!a||!b){r32w.push(null);continue;}
        var gk=reg+"_R32_"+pi,wid=playGame(a.id,b.id,gk,rat);
        wins[wid].R32++;r32w.push(byId[wid]);
      }
      var s16w=[];
      for(var pi=0;pi<S16_PAIRS.length;pi++){
        var a=r32w[S16_PAIRS[pi][0]],b=r32w[S16_PAIRS[pi][1]];
        if(!a||!b){s16w.push(null);continue;}
        var gk=reg+"_S16_"+pi,wid=playGame(a.id,b.id,gk,rat);
        wins[wid].S16++;s16w.push(byId[wid]);
      }
      var a=s16w[0],b=s16w[1];if(!a||!b){regWinners.push(null);continue;}
      var gk=reg+"_E8_0",wid=playGame(a.id,b.id,gk,rat);
      wins[wid].E8++;regWinners.push(byId[wid]);
    }
    var f4w=[],F4_PAIRS=[[0,1],[2,3]];
    for(var pi=0;pi<F4_PAIRS.length;pi++){
      var a=regWinners[F4_PAIRS[pi][0]],b=regWinners[F4_PAIRS[pi][1]];
      if(!a||!b){f4w.push(null);continue;}
      var gk="F4_"+pi,wid=playGame(a.id,b.id,gk,rat);
      wins[wid].F4++;f4w.push(byId[wid]);
    }
    var a=f4w[0],b=f4w[1];if(!a||!b)continue;
    var wid=playGame(a.id,b.id,"NCG_0",rat);
    wins[wid].Champion++;
  }
  var probs={};
  for(var i=0;i<teams.length;i++){var tid=teams[i].id;probs[tid]={};for(var ri=0;ri<ROUNDS.length;ri++)probs[tid][ROUNDS[ri]]=wins[tid][ROUNDS[ri]]/N;}
  return probs;
}

function parseCmpSource(raw){
  if(!raw.trim())return[];
  var lines=raw.trim().split(/\r?\n/),results=[];
  var REGS=["south","east","west","midwest"];
  function isRegion(s){return REGS.indexOf((s||"").toLowerCase().trim())>=0;}
  function isSeed(s){var v=parseInt(s);return !isNaN(v)&&v>=1&&v<=16&&s.replace(/\s/g,"").length<=2;}
  function isPercent(s){return /[\d.]+%/.test(s);}
  function isDollarVal(s){return /\$[\d,]+/.test(s)||/^[\d,]+$/.test(s.replace(/[$,\s]/g,""));}
  function parseDollar(s){if(!s)return null;var c=s.replace(/[$,\s+]/g,"").replace(/--/,"").trim();if(!c||c==="-")return null;var v=parseFloat(c);return isNaN(v)?null:v;}
  function parsePct(s){var c=(s||"").replace(/[%\s]/g,"").trim();var v=parseFloat(c);return isNaN(v)?null:v;}
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=line.indexOf("\t")>=0?line.split("\t"):line.split(/  +/);
    cols=cols.map(function(c){return c.trim().replace(/^"|"$/g,"");}).filter(function(c){return c.length>0;});
    if(cols.length<2)continue;
    var joined=cols.join(" ").toLowerCase();
    if(joined.indexOf("seed")>=0&&joined.indexOf("team")>=0)continue;
    if(joined.indexOf("projected pot")>=0)continue;
    var seed=null,name=null,region=null,ev=null;
    if(isSeed(cols[0])){
      seed=parseInt(cols[0]);name=cols[1]||null;
      for(var j=2;j<cols.length;j++)if(isRegion(cols[j])){region=cols[j];break;}
      for(var j=2;j<cols.length;j++){if(isDollarVal(cols[j])&&!isPercent(cols[j])){var v=parseDollar(cols[j]);if(v!==null&&v>0){ev=v;break;}}}
      if(ev===null){for(var j=2;j<cols.length;j++){if(isPercent(cols[j])){var pct=parsePct(cols[j]);if(pct!==null){ev=+(pct*1000).toFixed(0);break;}}}}
    } else {
      name=cols[0];
      if(name.toLowerCase()==="team"||name.toLowerCase()==="name")continue;
      for(var j=1;j<cols.length;j++){var v=parseDollar(cols[j]);if(v!==null){ev=v;break;}}
      for(var j=1;j<cols.length;j++){if(isSeed(cols[j])){seed=parseInt(cols[j]);break;}}
    }
    if(!name)continue;
    var nl=name.toLowerCase();
    if(nl==="team"||nl==="name"||nl==="school"||nl.indexOf("projected")>=0)continue;
    results.push({raw:name,name:cmpNorm(name),seed:seed,region:region||null,ev:ev});
  }
  return results;
}

function parseFutureYear(raw){
  if(!raw.trim())return[];
  var lines=raw.trim().split(/\r?\n/);
  var results=[];
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=line.indexOf("\t")>=0?line.split("\t"):line.split(",");
    cols=cols.map(function(c){return c.trim().replace(/^"|"$/g,"").replace(/^\$/,"");});
    if(cols.length<5)continue;
    // detect header
    var joined=cols.join(" ").toLowerCase();
    if(joined.indexOf("year")>=0&&joined.indexOf("team")>=0)continue;
    var year=parseInt(cols[0]),team=(cols[1]||"").trim(),region=(cols[2]||"").trim(),seed=parseInt(cols[3]),buyer=(cols[4]||"").trim();
    var priceStr=(cols[5]||"").replace(/[$,]/g,"").trim();
    var price=parseFloat(priceStr)||0;
    if(!year||!team||!seed||!price)continue;
    results.push({year:year,team:team,region:region,seed:seed,buyer:buyer,price:price});
  }
  return results;
}
