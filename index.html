function mulberry32(seed){
  return function(){
    seed|=0;seed=seed+0x6D2B79F5|0;
    var t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}
function b2pd(b){var p=Math.max(0.001,Math.min(0.999,b));return Math.log(p/(1-p))/0.163;}
function blendR(t,w){return(1-w)*t.kenpom+w*b2pd(t.torvik)+(t.adj||0)+(t.adjInj||0);}
function sp2wp(s){return 1/(1+Math.exp(-0.163*(-s)));}

function runSim(teams,N,blendW,liveWinners){
  var rng=mulberry32(20250316),STD=11.2,lw=liveWinners||{};
  var byId={},baseRat={};
  for(var i=0;i<teams.length;i++){byId[teams[i].id]=teams[i];baseRat[teams[i].id]=blendR(teams[i],blendW);}
  var wins={};
  for(var i=0;i<teams.length;i++)wins[teams[i].id]={R64:0,R32:0,S16:0,E8:0,F4:0,Champion:0};
  function playGame(idA,idB,gk,rat){
    if(lw[gk])return lw[gk];
    var u=rng();while(u===0)u=rng();
    var z=Math.sqrt(-2*Math.log(u))*Math.cos(6.283185*rng());
    var diff=(rat[idA]-rat[idB])+STD*z;
    var wid=diff>0?idA:idB;
    var bump=0.04*(Math.abs(diff)-Math.abs(rat[idA]-rat[idB]));
    if(bump>0)rat[wid]+=bump;
    return wid;
  }
  for(var sim=0;sim<N;sim++){
    var rat={};for(var i=0;i<teams.length;i++)rat[teams[i].id]=baseRat[teams[i].id];
    var regWinners=[];
    for(var ri=0;ri<REGIONS.length;ri++){
      var reg=REGIONS[ri];
      var rt=[];for(var i=0;i<teams.length;i++)if(teams[i].region===reg)rt.push(teams[i]);
      var bySeed={};for(var i=0;i<rt.length;i++)bySeed[rt[i].seed]=rt[i];
      var r64w=[];
      for(var mi=0;mi<R64_PAIRS.length;mi++){
        var t1=bySeed[R64_PAIRS[mi][0]],t2=bySeed[R64_PAIRS[mi][1]];
        if(!t1||!t2){r64w.push(null);continue;}
        var gk=reg+"_R64_"+mi,wid=playGame(t1.id,t2.id,gk,rat);
        wins[wid].R64++;r64w.push(byId[wid]);
      }
      var r32w=[];
      for(var pi=0;pi<R32_PAIRS.length;pi++){
        var a=r64w[R32_PAIRS[pi][0]],b=r64w[R32_PAIRS[pi][1]];
        if(!a||!b){r32w.push(null);continue;}
        var gk=reg+"_R32_"+pi,wid=playGame(a.id,b.id,gk,rat);
        wins[wid].R32++;r32w.push(byId[wid]);
      }
      var s16w=[];
      for(var pi=0;pi<S16_PAIRS.length;pi++){
        var a=r32w[S16_PAIRS[pi][0]],b=r32w[S16_PAIRS[pi][1]];
        if(!a||!b){s16w.push(null);continue;}
        var gk=reg+"_S16_"+pi,wid=playGame(a.id,b.id,gk,rat);
        wins[wid].S16++;s16w.push(byId[wid]);
      }
      var a=s16w[0],b=s16w[1];
      if(!a||!b){regWinners.push(null);continue;}
      var gk=reg+"_E8_0",wid=playGame(a.id,b.id,gk,rat);
      wins[wid].E8++;regWinners.push(byId[wid]);
    }
    var f4w=[],F4_PAIRS=[[0,1],[2,3]];
    for(var pi=0;pi<F4_PAIRS.length;pi++){
      var a=regWinners[F4_PAIRS[pi][0]],b=regWinners[F4_PAIRS[pi][1]];
      if(!a||!b){f4w.push(null);continue;}
      var gk="F4_"+pi,wid=playGame(a.id,b.id,gk,rat);
      wins[wid].F4++;f4w.push(byId[wid]);
    }
    var a=f4w[0],b=f4w[1];if(!a||!b)continue;
    var wid=playGame(a.id,b.id,"NCG_0",rat);
    wins[wid].Champion++;
  }
  var probs={};
  for(var i=0;i<teams.length;i++){
    var tid=teams[i].id;probs[tid]={};
    for(var ri=0;ri<ROUNDS.length;ri++)probs[tid][ROUNDS[ri]]=wins[tid][ROUNDS[ri]]/N;
  }
  return probs;
}

// ── COMPARE SOURCE PARSER ────────────────────────────────────────────────────
function parseCmpSource(raw){
  if(!raw.trim())return[];
  var lines=raw.trim().split(/\r?\n/),results=[];
  var REGS=["south","east","west","midwest"];
  function isRegion(s){return REGS.indexOf((s||"").toLowerCase().trim())>=0;}
  function isSeed(s){var v=parseInt(s);return !isNaN(v)&&v>=1&&v<=16&&s.replace(/\s/g,"").length<=2;}
  function isPercent(s){return /[\d.]+%/.test(s);}
  function isDollarVal(s){return /\$[\d,]+/.test(s)||/^[\d,]+$/.test(s.replace(/[$,\s]/g,""));}
  function parseDollar(s){if(!s)return null;var c=s.replace(/[$,\s+]/g,"").replace(/--/,"").trim();if(!c||c==="-")return null;var v=parseFloat(c);return isNaN(v)?null:v;}
  function parsePct(s){var c=(s||"").replace(/[%\s]/g,"").trim();var v=parseFloat(c);return isNaN(v)?null:v;}
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=line.indexOf("\t")>=0?line.split("\t"):line.split(/  +/);
    cols=cols.map(function(c){return c.trim().replace(/^"|"$/g,"");}).filter(function(c){return c.length>0;});
    if(cols.length<2)continue;
    var joined=cols.join(" ").toLowerCase();
    if(joined.indexOf("seed")>=0&&joined.indexOf("team")>=0)continue;
    if(joined.indexOf("projected pot")>=0)continue;
    var seed=null,name=null,region=null,ev=null;
    if(isSeed(cols[0])){
      seed=parseInt(cols[0]);name=cols[1]||null;
      for(var j=2;j<cols.length;j++)if(isRegion(cols[j])){region=cols[j];break;}
      for(var j=2;j<cols.length;j++){if(isDollarVal(cols[j])&&!isPercent(cols[j])){var v=parseDollar(cols[j]);if(v!==null&&v>0){ev=v;break;}}}
      if(ev===null){for(var j=2;j<cols.length;j++){if(isPercent(cols[j])){var pct=parsePct(cols[j]);if(pct!==null){ev=+(pct*1000).toFixed(0);break;}}}}
    } else {
      name=cols[0];
      if(name.toLowerCase()==="team"||name.toLowerCase()==="name")continue;
      for(var j=1;j<cols.length;j++){var v=parseDollar(cols[j]);if(v!==null){ev=v;break;}}
      for(var j=1;j<cols.length;j++){if(isSeed(cols[j])){seed=parseInt(cols[j]);break;}}
    }
    if(!name)continue;
    var nl=name.toLowerCase();
    if(nl==="team"||nl==="name"||nl==="school"||nl.indexOf("projected")>=0)continue;
    results.push({raw:name,name:cmpNorm(name),seed:seed,region:region||null,ev:ev});
  }
  return results;
}

  // ── COMPARE LOGIC ────────────────────────────────────────────────────────
  function runCompare(){
    var a=parseCmpSource(cmpA),b=parseCmpSource(cmpB);
    if(!a.length&&!b.length)return;
    var mapB={};b.forEach(function(t){mapB[t.name]=t;});
    var rows=[],usedB={};
    a.forEach(function(tA){
      var tB=mapB[tA.name]||null;
      if(tB)usedB[tA.name]=true;
      rows.push({raw:tA.raw,name:tA.name,seed:tA.seed||(tB&&tB.seed)||null,region:tA.region||(tB&&tB.region)||null,evA:tA.ev,evB:tB?tB.ev:null});
    });
    b.forEach(function(tB){
      if(!usedB[tB.name])rows.push({raw:tB.raw,name:tB.name,seed:tB.seed,region:tB.region,evA:null,evB:tB.ev});
    });
    setCmpRows(rows);
    setCmpDone(true);

    // Build blendMap: for each matched row compute (avgEV / totalPot) and avgEV
    // totalPot = sum of all matched avgEVs (re-normalised so pcts sum to 100%)
    var matched=rows.filter(function(r){return r.evA!==null&&r.evB!==null;});
    var totalAvg=matched.reduce(function(s,r){return s+(r.evA+r.evB)/2;},0);
    var newMap={};
    if(totalAvg>0){
      matched.forEach(function(r){
        var avg=(r.evA+r.evB)/2;
        newMap[r.name]={
          blendPct: avg/totalAvg,          // fraction of total pot
          blendAvgEV: avg                  // raw avg EV before rescaling
        };
      });
    }
    setBlendMap(newMap);
  }

  function autoFillA(){

    var lo=["Seed\tTeam\tRegion\tProjected Pot%\tValue Based On Your Pot Size"];
    sorted.forEach(function(t){
      var probs=simResults[t.id]||{},expRet=0,potPct=0;
      ROUNDS.forEach(function(r){expRet+=((probs[r]||0)*RPAY[r]*unit);potPct+=(probs[r]||0)*RPAY[r];});
      lo.push(t.seed+"\t"+t.name+"\t"+t.region+"\t"+(potPct*100).toFixed(2)+"%\t$"+expRet.toFixed(0));
    });
    setCmpA(lo.join("\n"));
  }

  var hasBlend=Object.keys(blendMap).length>0;

  var cmpFiltered=useMemo(function(){
    var q=cmpSearch.toLowerCase();
    var f=cmpRows.filter(function(r){
      if(q&&r.raw.toLowerCase().indexOf(q)<0)return false;
      if(cmpFilter==="matched"&&(r.evA===null||r.evB===null))return false;
      if(cmpFilter==="big"&&(r.evA===null||r.evB===null||Math.abs(r.evB-r.evA)<200))return false;
      if(cmpFilter==="onlyA"&&r.evB!==null)return false;
      if(cmpFilter==="onlyB"&&r.evA!==null)return false;
      return true;
    });
    f.sort(function(a,b){
      var va,vb;
      if(cmpSort==="name")return cmpDir==="asc"?a.raw.localeCompare(b.raw):b.raw.localeCompare(a.raw);
      if(cmpSort==="seed"){va=a.seed||99;vb=b.seed||99;}
      else if(cmpSort==="evA"){va=a.evA||0;vb=b.evA||0;}
      else if(cmpSort==="evB"){va=a.evB||0;vb=b.evB||0;}
      else if(cmpSort==="avg"){va=(a.evA!==null&&a.evB!==null)?(a.evA+a.evB)/2:0;vb=(b.evA!==null&&b.evB!==null)?(b.evA+b.evB)/2:0;}
      else if(cmpSort==="blendpct"){
        va=blendMap[a.name]?blendMap[a.name].blendPct:0;
        vb=blendMap[b.name]?blendMap[b.name].blendPct:0;
      }
      else if(cmpSort==="delta"){va=Math.abs((a.evB||0)-(a.evA||0));vb=Math.abs((b.evB||0)-(b.evA||0));}
      else{va=0;vb=0;}
      return cmpDir==="asc"?va-vb:vb-va;
    });
    return f;
  },[cmpRows,cmpSearch,cmpFilter,cmpSort,cmpDir,blendMap]);

  var cmpStats=useMemo(function(){
    var matched=cmpRows.filter(function(r){return r.evA!==null&&r.evB!==null;});
    if(!matched.length)return null;
    var deltas=matched.map(function(r){return r.evB-r.evA;});
    var absD=deltas.map(Math.abs);
    var avg=deltas.reduce(function(s,v){return s+v;},0)/deltas.length;
    var avgAbs=absD.reduce(function(s,v){return s+v;},0)/absD.length;
    var maxAbs=Math.max.apply(null,absD);
    var maxRow=matched[absD.indexOf(maxAbs)];
    var bigCount=absD.filter(function(v){return v>200;}).length;
    var onlyA=cmpRows.filter(function(r){return r.evA!==null&&r.evB===null;}).length;
    var onlyB=cmpRows.filter(function(r){return r.evA===null&&r.evB!==null;}).length;
    return{matched:matched.length,avg:avg,avgAbs:avgAbs,maxAbs:maxAbs,maxRow:maxRow,bigCount:bigCount,onlyA:onlyA,onlyB:onlyB};
  },[cmpRows]);

  function cmpTag(r){
    if(r.evA===null)return ce("span",{style:{background:"rgba(100,116,139,0.2)",color:"#94a3b8",borderRadius:"10px",padding:"1px 7px",fontSize:"9px",fontWeight:700}},"B Only");
    if(r.evB===null)return ce("span",{style:{background:"rgba(100,116,139,0.2)",color:"#94a3b8",borderRadius:"10px",padding:"1px 7px",fontSize:"9px",fontWeight:700}},"A Only");
    var d=Math.abs(r.evB-r.evA);

                ?ce("tr",{},ce("td",{colSpan:10,style:{textAlign:"center",padding:"40px",color:"#475569"}},"No rows match filter."))
                :cmpFiltered.map(function(r){
                  var delta=(r.evA!==null&&r.evB!==null)?r.evB-r.evA:null;
                  var isUnmatched=r.evA===null||r.evB===null;
                  var bEntry=blendMap[r.name]||null;
                  var bPct=bEntry?(bEntry.blendPct*100).toFixed(2)+"%":"--";
                  var bVal=bEntry?"$"+(bEntry.blendPct*calcPot).toFixed(0):"--";
                  var bPctColor=bEntry?"#e879f9":"#334155";
                  var bValColor=bEntry?"#c084fc":"#334155";
                  return ce("tr",{key:r.name,style:{opacity:isUnmatched?0.5:1}},
                    TD(r.seed?ce("span",{style:{background:seedBg(r.seed),color:"#fff",borderRadius:"3px",padding:"1px 5px",fontWeight:700,fontSize:"10px"}},"#"+r.seed):""),
                    TD(ce("span",{style:{fontWeight:600,whiteSpace:"nowrap"}},r.raw)),
                    TD(ce("span",{style:{color:"#64748b",fontSize:"10px"}},r.region||"")),
                    TD(fmtEV(r.evA),{textAlign:"right"}),
                    TD(fmtEV(r.evB),{textAlign:"right"}),
                    TD(fmtAvg(r.evA,r.evB),{textAlign:"right",borderLeft:"1px solid #334155"}),
                    TD(ce("span",{style:{color:bPctColor,fontWeight:700}},bPct),{textAlign:"right",borderLeft:"2px solid #4a1d96"}),
                    TD(ce("span",{style:{color:bValColor,fontWeight:700}},bVal),{textAlign:"right"}),
                    TD(fmtDelta(delta),{textAlign:"right"}),
                    TD(cmpTag(r))
                  );
                })
            )
          )
        )
      ):ce("div",{style:{textAlign:"center",padding:"50px",color:"#475569"}},
        ce("div",{style:{fontSize:"32px",marginBottom:"12px"}},"⚖️"),
        ce("div",{style:{fontSize:"13px",fontWeight:600,marginBottom:"6px"}},"Paste data into both sources and click Compare"),
        ce("div",{style:{fontSize:"11px"}},"Blend % and Blend Value will appear here and flow into the Calcutta EV tab automatically")
      )
    ):null,

    // ── INJURIES TAB ──────────────────────────────────────────────────────────
    tab==="injuries"?ce("div",{style:{padding:"14px"}},
      ce("div",{style:{background:"#0c1a2e",border:"1px solid #1e40af",borderRadius:"8px",padding:"12px 16px",marginBottom:"12px",display:"flex",gap:"12px",alignItems:"center",flexWrap:"wrap"}},
        ce("div",{style:{flex:1}},
          ce("div",{style:{fontSize:"13px",fontWeight:700,color:"#60a5fa"}},"🏥 Tournament Injury Report"),
          ce("div",{style:{fontSize:"10px",color:"#64748b",marginTop:"2px"}},"Known injuries entering the 2026 tournament. Use the Inj column in Setup to apply adjustments.")
        ),
        ce("button",{onClick:loadInjuries,disabled:injLoading,style:bSt({background:injLoading?"#334155":"#0e7490",color:"#fff",minWidth:"130px"})},injLoading?"⏳ Loading...":"🔄 Load Report")
      ),
      !injData&&!injLoading?ce("div",{style:{textAlign:"center",padding:"60px",color:"#64748b"}},
        ce("div",{style:{fontSize:"32px",marginBottom:"12px"}},"🏥"),
        ce("div",{style:{fontSize:"14px",fontWeight:600}},"Click Load Report to view injury data")
      ):null,
      injData?ce("div",{},
        ce("div",{style:{fontSize:"10px",color:"#475569",marginBottom:"10px",textAlign:"right"}},"Last updated: "+injData.timestamp),
        ce("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:"10px"}},
          injData.teams.map(function(t){
            var sc=t.severity==="High"?"#f87171":t.severity==="Medium"?"#fb923c":t.severity==="Low"?"#fde68a":"#4ade80";
            var sb=t.severity==="High"?"rgba(127,29,29,0.2)":t.severity==="Medium"?"rgba(124,45,18,0.2)":t.severity==="Low"?"rgba(113,63,18,0.15)":"rgba(22,101,52,0.1)";
            return ce("div",{key:t.team,style:{background:"#1e293b",borderRadius:"8px",padding:"12px",border:"1px solid "+(t.severity==="None"?"#1e293b":"#334155")}},
              ce("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:t.injuries.length?"8px":"0"}},
                ce("div",{style:{fontWeight:700,fontSize:"12px"}},t.team),
                ce("span",{style:{fontSize:"9px",fontWeight:700,color:sc,background:sb,padding:"2px 7px",borderRadius:"10px"}},t.severity==="None"?"✓ Healthy":t.severity)
              ),
              t.injuries.map(function(inj,i){
                var ic=inj.status==="Out"?"#f87171":inj.status==="Doubtful"?"#fb923c":inj.status==="Questionable"?"#fde68a":"#94a3b8";
                return ce("div",{key:i,style:{background:"#0f172a",borderRadius:"5px",padding:"6px 8px",marginTop:"4px"}},
                  ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"2px"}},
                    ce("span",{style:{fontWeight:600,fontSize:"11px"}},inj.player),
                    ce("span",{style:{fontSize:"9px",color:ic,fontWeight:700}},inj.status)
                  ),
                  ce("div",{style:{fontSize:"10px",color:"#94a3b8"}},inj.detail)
                );
              })
            );
          })
        )
      ):null
    ):null,

    // ── MODALS ────────────────────────────────────────────────────────────────
    pmO?ce("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}},
      ce("div",{style:{background:"#1e293b",borderRadius:"10px",padding:"20px",maxWidth:"520px",width:"90%",border:"1px solid #334155"}},
        ce("div",{style:{fontWeight:700,fontSize:"14px",marginBottom:"8px"}},"Paste Ratings"),
        ce("div",{style:{fontSize:"11px",color:"#94a3b8",marginBottom:"12px"}},"Copy name/kenpom/torvik columns from Google Sheet and paste below."),
        ce("textarea",{value:pt,onChange:function(ev){setPt(ev.target.value);},placeholder:"name\tkenpom\ttorvik",style:{width:"100%",height:"160px",background:"#0f172a",border:"1px solid #334155",borderRadius:"6px",color:"#f1f5f9",padding:"8px",fontSize:"11px",resize:"vertical",fontFamily:"monospace"}}),
        ce("div",{style:{display:"flex",gap:"8px",justifyContent:"flex-end",marginTop:"10px"}},
          ce("button",{onClick:function(){setPmO(false);setPt("");},style:bSt({background:"#334155",color:"#f1f5f9"})},"Cancel"),
          ce("button",{onClick:applyPaste,disabled:!pt.trim(),style:bSt({background:pt.trim()?"#1d4ed8":"#334155",color:"#fff"})},"Apply")))):null,

    emO?ce("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}},
      ce("div",{style:{background:"#1e293b",borderRadius:"10px",padding:"20px",maxWidth:"520px",width:"90%",border:"1px solid #334155"}},
        ce("div",{style:{fontWeight:700,fontSize:"14px",marginBottom:"8px"}},"Export State"),
        ce("textarea",{readOnly:true,value:et,onClick:function(ev){ev.target.select();},style:{width:"100%",height:"100px",background:"#0f172a",border:"1px solid #334155",borderRadius:"6px",color:"#4ade80",padding:"8px",fontSize:"10px",resize:"none",fontFamily:"monospace"}}),
        ce("div",{style:{display:"flex",gap:"8px",justifyContent:"flex-end",marginTop:"10px"}},
          ce("button",{onClick:function(){if(navigator.clipboard)navigator.clipboard.writeText(et);},style:bSt({background:"#166534",color:"#4ade80"})},"Copy"),
          ce("button",{onClick:function(){setEmO(false);},style:bSt({background:"#334155",color:"#f1f5f9"})},"Close")))):null,

    imO?ce("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}},
      ce("div",{style:{background:"#1e293b",borderRadius:"10px",padding:"20px",maxWidth:"520px",width:"90%",border:"1px solid #334155"}},
        ce("div",{style:{fontWeight:700,fontSize:"14px",marginBottom:"8px"}},"Import State"),
        ce("textarea",{value:it,onChange:function(ev){setIt(ev.target.value);setIe("");},placeholder:"Paste exported state...",style:{width:"100%",height:"100px",background:"#0f172a",border:"1px solid #334155",borderRadius:"6px",color:"#f1f5f9",padding:"8px",fontSize:"10px",resize:"none",fontFamily:"monospace"}}),
        ie?ce("div",{style:{color:"#f87171",fontSize:"11px",marginTop:"6px"}},ie):null,
        ce("div",{style:{display:"flex",gap:"8px",justifyContent:"flex-end",marginTop:"10px"}},
          ce("button",{onClick:function(){setImO(false);setIt("");setIe("");},style:bSt({background:"#334155",color:"#f1f5f9"})},"Cancel"),
          ce("button",{onClick:doImport,disabled:!it.trim(),style:bSt({background:it.trim()?"#1d4ed8":"#334155",color:"#fff"})},"Apply")))):null,

    calcExO?ce("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}},
      ce("div",{style:{background:"#1e293b",borderRadius:"10px",padding:"20px",maxWidth:"580px",width:"95%",border:"1px solid #334155"}},
        ce("div",{style:{fontWeight:700,fontSize:"14px",marginBottom:"4px"}},"📋 Calcutta Export"),
        ce("div",{style:{fontSize:"10px",color:"#64748b",marginBottom:"10px"}},"Select all (Ctrl+A), copy, then paste into Source A — or use Auto-fill on the Compare tab directly."),
        ce("textarea",{readOnly:true,value:calcExT,onClick:function(ev){ev.target.select();},style:{width:"100%",height:"240px",background:"#0f172a",border:"1px solid #334155",borderRadius:"6px",color:"#4ade80",padding:"8px",fontSize:"10px",resize:"none",fontFamily:"monospace",lineHeight:1.6}}),
        ce("div",{style:{display:"flex",gap:"8px",justifyContent:"flex-end",marginTop:"10px"}},
          ce("button",{onClick:function(){if(navigator.clipboard)navigator.clipboard.writeText(calcExT);},style:bSt({background:"#166534",color:"#4ade80"})},"Try Copy"),
          ce("button",{onClick:function(){setCalcExO(false);},style:bSt({background:"#334155",color:"#f1f5f9"})},"Close")))):null,

    npmO?ce("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}},
      ce("div",{style:{background:"#1e293b",borderRadius:"10px",padding:"20px",maxWidth:"380px",width:"90%",border:"1px solid #334155"}},
        ce("div",{style:{fontWeight:700,fontSize:"14px",marginBottom:"10px"}},"New Profile"),
        ce("input",{value:npn,onChange:function(ev){setNpn(ev.target.value);},placeholder:"Profile name",style:Object.assign({},iSt({textAlign:"left",padding:"8px 12px",width:"100%",fontSize:"13px"}),{marginBottom:"12px"})}),
        ce("div",{style:{display:"flex",gap:"8px",justifyContent:"flex-end"}},
          ce("button",{onClick:function(){setNpmO(false);},style:bSt({background:"#334155",color:"#f1f5f9"})},"Cancel"),
          ce("button",{onClick:createProfile,disabled:!npn.trim(),style:bSt({background:npn.trim()?"#1d4ed8":"#334155",color:"#fff"})},"Create")))):null,

    dcO?ce("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}},
      ce("div",{style:{background:"#1e293b",borderRadius:"10px",padding:"20px",maxWidth:"380px",width:"90%",border:"1px solid #7f1d1d"}},
        ce("div",{style:{fontWeight:700,fontSize:"14px",marginBottom:"10px",color:"#fca5a5"}},"Delete Profile?"),
        ce("div",{style:{fontSize:"11px",color:"#94a3b8",marginBottom:"16px"}},"Permanently delete \""+active+"\" and all its data?"),
        ce("div",{style:{display:"flex",gap:"8px",justifyContent:"flex-end"}},
          ce("button",{onClick:function(){setDcO(false);},style:bSt({background:"#334155",color:"#f1f5f9"})},"Cancel"),
          ce("button",{onClick:deleteProfile,style:bSt({background:"#7f1d1d",color:"#fca5a5"})},"Delete")))):null
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
})();
</script>
</body>
</html>
